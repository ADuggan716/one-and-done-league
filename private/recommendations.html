<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Pick Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .support-top {
        align-items: stretch;
      }
      .key-card {
        position: relative;
        border: 1px solid #d3ddef;
        background: linear-gradient(180deg, #f3f8ff, #eef5ff);
      }
      .recommendation-grid {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 8px;
        scroll-snap-type: x proximity;
      }
      .alternate-card {
        min-width: 360px;
        flex: 0 0 360px;
        scroll-snap-align: start;
      }
      .key-card h2 {
        color: #284a7a;
      }
      .key-card .term {
        background: #f8fbff;
        border-color: #d8e4f7;
      }
      .key-card .term p + p {
        color: #4a5f80;
      }
      .key-card p strong {
        color: #1f3d68;
      }
      .score {
        font-size: 1.5rem;
        font-weight: 700;
      }
      .score-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 6px;
      }
      .world-rank {
        margin: 0;
        font-size: 0.8rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .candidate-block p {
        margin: 0;
        font-size: 0.88rem;
        line-height: 1.35;
      }
      .metric-grid span {
        font-size: 0.7rem;
      }
      .metric-grid strong {
        font-size: 0.9rem;
      }
      .sub,
      .source-list li {
        font-size: 0.82rem;
      }
      @media (max-width: 780px) {
        .alternate-card {
          min-width: 300px;
          flex-basis: 300px;
        }
      }
      .recommendation-grid::-webkit-scrollbar {
        height: 8px;
      }
      .recommendation-grid::-webkit-scrollbar-thumb {
        background: #ced9ea;
        border-radius: 999px;
      }
      .recommendation-grid::-webkit-scrollbar-track {
        background: #eef3fb;
        border-radius: 999px;
      }
      .kicker {
        margin: 0 0 4px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 0.75rem;
      }
      .candidate-block {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        background: var(--surface-soft);
        margin: 8px 0;
      }
      .candidate-block p {
        margin: 0;
        font-size: 0.86rem;
        line-height: 1.35;
      }
      .candidate-block p + p {
        margin-top: 4px;
        color: var(--muted);
      }
      .sub {
        color: var(--muted);
        font-size: 0.82rem;
      }
      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        gap: 8px;
        margin: 10px 0 12px;
      }
      .metric-grid > div {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 7px 9px;
        background: #fff;
      }
      .metric-grid span {
        display: block;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 3px;
      }
      .term-list {
        display: grid;
        gap: 9px;
      }
      .term {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px 10px;
        background: var(--surface-soft);
      }
      .term p {
        margin: 0;
      }
      .term p + p {
        margin-top: 4px;
        color: var(--muted);
      }
      .source-list {
        margin: 8px 0 0;
        padding-left: 18px;
      }
      .source-list li {
        margin: 3px 0;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1>Weekly Pick Support</h1>
        <div class="hero-meta" id="meta">Loading recommendations...</div>
      </header>

      <section class="split support-top">
        <article class="card">
          <h2>Primary Pick</h2>
          <div id="primary"></div>
        </article>
        <article class="card key-card">
          <h2>Scoring Key</h2>
          <div id="scoreKey"></div>
        </article>
      </section>

      <section class="card">
        <h2>Alternates (4)</h2>
        <div class="recommendation-grid" id="alternates"></div>
      </section>

      <section class="card">
        <h2>Online Sources</h2>
        <ul id="sources"></ul>
      </section>
    </main>

    <script type="module" src="./recommendations.js?v=3"></script>
  </body>
</html>
