  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>
    <main class="shell">
      <header class="hero">
        <h1>One and Done Dashboard</h1>
        <div class="hero-meta" id="syncMeta">Loading latest sync...</div>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="standings">Standings</button>
        <button class="tab" data-tab="availability">Golfer Availability</button>
      </nav>

      <section class="panel" id="standingsPanel">
        <div class="split">
          <section class="card">
            <h2>Next Tournament</h2>
            <div id="nextTournament"></div>
          </section>
          <section class="card championship">
            <h2>Ultimate Championship</h2>
            <div id="ultimateChampionship"></div>
          </section>
        </div>

        <section class="card">
          <h2>Season Summary</h2>
          <div class="matrix-wrap"><table id="seasonTable"></table></div>
        </section>

        <section class="card">
          <h2>Week by Week Comparison</h2>
          <div class="control-row">
            <label>Event
              <select id="eventSelect"></select>
            </label>
          </div>
          <div class="matrix-wrap"><table id="weeklyTable"></table></div>
        </section>

        <section class="card">
          <h2>Full Season Weekly Table</h2>
          <div class="matrix-wrap"><table id="seasonWeeklyTable"></table></div>
        </section>
      </section>

      <section class="panel hidden" id="availabilityPanel">
        <div class="split">
          <section class="card">
            <h2>Next Tournament</h2>
            <div id="availabilityTournament"></div>
          </section>
          <section class="card">
            <h2>Golfer Scope</h2>
            <div class="scope-row">
              <button id="scopeAll" class="scope-btn active">All Golfers</button>
              <button id="scopeNext" class="scope-btn">Next Tournament</button>
            </div>
            <div class="control-row">
              <label>Golfer search
                <input id="poolSearch" type="text" placeholder="Search golfer" />
              </label>
            </div>
          </section>
        </div>

        <section class="card">
          <h2>Availability Matrix</h2>
          <div class="matrix-wrap">
            <table id="availabilityMatrix"></table>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
