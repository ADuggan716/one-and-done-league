name: Sync League Data

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run sync now (ignore time window)"
        required: false
        default: "true"
  schedule:
    - cron: "5 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decide if run window (America/New_York)
        id: window
        run: |
          python3 - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("America/New_York"))
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          force = os.environ.get("FORCE_RUN", "false").lower() == "true"
          # Thursday 09:00 and Sunday 20:00 in New York local time.
          should_window = (now.weekday() == 3 and now.hour == 9) or (now.weekday() == 6 and now.hour == 20)
          should = force or event_name == "workflow_dispatch" or should_window
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"run={'true' if should else 'false'}\n")
          print("Now (NY):", now.isoformat(), "event=", event_name, "force=", force, "run=", should)
          PY
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}

      - name: Stop if outside sync windows
        if: steps.window.outputs.run != 'true'
        run: echo "Outside Thursday 9:00 AM / Sunday 8:00 PM ET sync windows."

      - name: Create runtime config and cookie
        if: steps.window.outputs.run == 'true'
        env:
          RYP_LEAGUE_ID: ${{ secrets.RYP_LEAGUE_ID }}
          RYP_COOKIE: ${{ secrets.RYP_COOKIE }}
          FORM_SOURCE_URL: ${{ secrets.FORM_SOURCE_URL }}
          FORM_SOURCE_API_KEY: ${{ secrets.FORM_SOURCE_API_KEY }}
          COURSE_SOURCE_URL: ${{ secrets.COURSE_SOURCE_URL }}
          COURSE_SOURCE_API_KEY: ${{ secrets.COURSE_SOURCE_API_KEY }}
        run: |
          mkdir -p config
          python3 - <<'PY'
          import json
          import os

          cfg = {
            "provider": "splash",
            "me": "Andrew",
            "subgroupMembers": ["Andrew", "Paul", "Dakota", "Mike"],
            "teams": [
              {"name": "Young Guns", "members": ["Andrew", "Dakota"]},
              {"name": "Experienced Gentlemen", "members": ["Mike", "Paul"]},
            ],
            "memberAliases": {
              "ADUGGAN716": "Andrew"
            },
            "cookiePath": "config/runyourpool.cookie",
            "splash": {
              "baseUrl": "https://sm.app.splashsports.com",
              "leaguePath": os.environ.get("RYP_LEAGUE_ID", "").strip(),
              "standingsPath": "/Golf/PickX/standings.cfm"
            },
            "onlineSources": [
              {
                "name": "Recent Form Feed",
                "url": os.environ.get("FORM_SOURCE_URL", "").strip(),
                "authEnv": "FORM_SOURCE_API_KEY"
              },
              {
                "name": "Course History Feed",
                "url": os.environ.get("COURSE_SOURCE_URL", "").strip(),
                "authEnv": "COURSE_SOURCE_API_KEY"
              }
            ],
            "recommendationWeights": {
              "expected": 0.35,
              "uniqueness": 0.15,
              "opportunityCost": 0.15,
              "recentForm": 0.2,
              "historicalStrength": 0.1,
              "courseHistory": 0.05
            }
          }

          with open("config/config.json", "w", encoding="utf-8") as f:
            json.dump(cfg, f, indent=2)
            f.write("\\n")
          PY

          printf "%s" "${RYP_COOKIE}" > config/runyourpool.cookie

      - name: Sync data
        if: steps.window.outputs.run == 'true'
        env:
          FORM_SOURCE_API_KEY: ${{ secrets.FORM_SOURCE_API_KEY }}
          COURSE_SOURCE_API_KEY: ${{ secrets.COURSE_SOURCE_API_KEY }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path(".")
          data_dir = root / "data"
          data_dir.mkdir(exist_ok=True)

          def load_or_write(path, fallback):
            if not path.exists():
              path.write_text(json.dumps(fallback, indent=2) + "\\n", encoding="utf-8")
              return
            try:
              json.loads(path.read_text(encoding="utf-8"))
            except Exception:
              path.write_text(json.dumps(fallback, indent=2) + "\\n", encoding="utf-8")

          load_or_write(
            data_dir / "online_signals.json",
            {"fetchedAt": None, "sourceNotes": [], "signals": []}
          )
          load_or_write(
            data_dir / "player_pool.json",
            {
              "members": {
                "Andrew": {"used": [], "available": []},
                "Paul": {"used": [], "available": []},
                "Dakota": {"used": [], "available": []},
                "Mike": {"used": [], "available": []}
              },
              "golfers": []
            }
          )
          PY
          node scripts/sync_runyourpool.mjs

      - name: Commit updated data
        if: steps.window.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "chore: refresh league data"
          git push
